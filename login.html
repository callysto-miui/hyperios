<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HyperOS Unlock Bot — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c10;
      --surface:  #111318;
      --border:   #1e2330;
      --accent:   #f97316;
      --accent2:  #fb923c;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --error:    #f87171;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridScroll {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: .6; transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 0 1px rgba(249,115,22,.08), 0 32px 64px rgba(0,0,0,.5);
      animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -.3px;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,.15);
    }

    input::placeholder { color: var(--muted); }

    .error-msg {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button[type="submit"] {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .3px;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .15s;
    }

    button[type="submit"]:hover  { opacity: .9; transform: translateY(-1px); }
    button[type="submit"]:active { opacity: 1;  transform: translateY(0); }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔓</div>
      <div class="logo-text">Hyper<span>OS</span> Bot</div>
    </div>

    <h1>Admin Login</h1>
    <p class="subtitle">Enter your credentials to access the dashboard.</p>

    {% if error %}
    <div class="error-msg">
      <span>⚠</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          required
        />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit">Sign In →</button>
    </form>

    <p class="footer-note">HyperOS Unlock Bot · Admin Panel</p>
  </div>
</body>
</html>
