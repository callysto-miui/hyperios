services:
  - type: web
    name: hyperos-unlock-bot
    runtime: python
    repo: https://github.com/callysto-miui/hyperios
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/time
    autoDeploy: true
